<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioScan - Live Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { background: '#0e1118', card: '#131824', secondary: '#1a2235', primary: '#4ed4e6', success: '#34d399', destructive: '#f87171', border: '#242e42', muted: '#64748b', foreground: '#f8fafc', } } }
        }
    </script>
    <style>
        .glass-card { background: rgba(19, 24, 36, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(36, 46, 66, 0.4); }
        .scanner-line { width: 100%; height: 2px; background: #4ed4e6; position: absolute; top: 0; left: 0; box-shadow: 0 0 10px #4ed4e6; animation: scan 3s infinite linear; display: none; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
    </style>
</head>
<body class="bg-background text-foreground min-h-screen p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="flex items-center justify-between">
            <div>
                <a href="{{ url_for('faculty.end_session', course_id=course.id) }}" 
                   onclick="return confirm('Are you sure you want to end the session? Anyone who has not scanned their face yet will be permanently marked ABSENT for today.')"
                   class="inline-flex items-center text-sm font-medium text-muted hover:text-primary transition-colors mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="m15 18-6-6 6-6"/></svg>
                    End Session & Return
                </a>
                <h1 class="text-2xl font-bold flex items-center gap-3">
                    Live Scanner: <span class="text-primary">{{ course.name }}</span>
                </h1>
                <p class="text-sm text-muted mt-1">Section: {{ course.target_section }} | Code: {{ course.code }}</p>
            </div>
            
            <button id="toggleScanner" class="bg-primary hover:bg-primary/90 text-background px-6 py-3 rounded-lg font-bold flex items-center gap-2 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12A10 10 0 1 1 22 12A10 10 0 1 1 2 12"/><path d="M12 8v4l3 3"/></svg>
                <span id="btnText">Start Scanning</span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 glass-card rounded-2xl border-border p-4 relative overflow-hidden">
                <div class="relative rounded-xl overflow-hidden bg-black aspect-video flex items-center justify-center">
                    <video id="videoElement" autoplay playsinline class="w-full h-full object-cover transform scale-x-[-1]"></video>
                    <div id="scannerLine" class="scanner-line"></div>
                    <canvas id="canvasElement" class="hidden"></canvas>
                    
                    <div id="blinkWarning" class="absolute inset-0 bg-destructive/30 backdrop-blur-sm flex flex-col items-center justify-center hidden transition-all z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white animate-bounce mb-3"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        <p class="text-2xl font-black text-white tracking-widest drop-shadow-lg uppercase">Liveness Check</p>
                        <p id="blinkWarningText" class="text-white font-medium drop-shadow-md mt-1">Please blink to verify...</p>
                    </div>
                </div>
                
                <div id="statusIndicator" class="absolute top-8 right-8 px-3 py-1 rounded-full text-xs font-bold bg-secondary border border-border text-muted flex items-center gap-2 z-20">
                    <div class="w-2 h-2 rounded-full bg-muted" id="statusDot"></div>
                    <span id="statusText">System Idle</span>
                </div>
            </div>

            <div class="glass-card rounded-2xl border-border p-6 flex flex-col h-[500px]">
                <h3 class="font-bold text-lg border-b border-border pb-3 mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-success"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    Live Detections
                </h3>
                
                <div id="logsContainer" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                    <p class="text-sm text-muted italic text-center mt-10">Awaiting scanner activation...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loggedStudentsTracker = new Set();
        
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const toggleBtn = document.getElementById('toggleScanner');
        const btnText = document.getElementById('btnText');
        const scannerLine = document.getElementById('scannerLine');
        const logsContainer = document.getElementById('logsContainer');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        
        // UI Elements for Liveness Overlay
        const blinkWarning = document.getElementById('blinkWarning');
        const blinkWarningText = document.getElementById('blinkWarningText');
        
        const COURSE_ID = {{ course.id }}; 
        let isScanning = false;
        let scanInterval;
        let isFirstFrame = false;

        navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("Camera access denied or unavailable."); });

        toggleBtn.addEventListener('click', () => {
            if (!isScanning) {
                isScanning = true;
                btnText.innerText = "Stop Scanner";
                isFirstFrame = true;
                toggleBtn.classList.replace("bg-primary", "bg-destructive");
                scannerLine.style.display = "block";
                statusText.innerText = "Scanning Active";
                statusDot.classList.replace("bg-muted", "bg-success");
                statusDot.classList.add("animate-pulse");
                logsContainer.innerHTML = ""; 
                blinkWarning.classList.add('hidden');
                
                loggedStudentsTracker.clear();
                
                // Fire rapidly (400ms) to catch the blink
                scanInterval = setInterval(captureAndSendFrame, 400);
            } else {
                isScanning = false;
                btnText.innerText = "Start Scanning";
                toggleBtn.classList.replace("bg-destructive", "bg-primary");
                scannerLine.style.display = "none";
                statusText.innerText = "System Idle";
                statusDot.classList.replace("bg-success", "bg-muted");
                statusDot.classList.remove("animate-pulse");
                blinkWarning.classList.add('hidden');
                clearInterval(scanInterval);
            }
        });

        function captureAndSendFrame() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const base64Image = canvas.toDataURL('image/jpeg', 0.8);

            fetch("{{ url_for('faculty.process_frame') }}", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    course_id: COURSE_ID, 
                    image: base64Image,
                    is_new_session: isFirstFrame
                })
            })

            .then(response => response.json())
            .then(data => {
                if (data.status === 'success' && data.recognized.length > 0) {
                    data.recognized.forEach(studentStatus => {
                        
                        // 1. Check if they successfully passed the Liveness test
                        if (studentStatus.startsWith("Marked:") || studentStatus.startsWith("Already Logged:")) {
                            let name = studentStatus.split(":")[1].trim();
                            blinkWarning.classList.add('hidden'); // Hide the red warning
                            
                            if (!loggedStudentsTracker.has(name)) {
                                loggedStudentsTracker.add(name);
                                const logEntry = document.createElement("div");
                                logEntry.className = "p-3 rounded-lg border text-sm font-medium flex justify-between items-center bg-success/10 border-success/30 text-success";
                                logEntry.innerHTML = `<span>${name}</span> <span class="text-xs bg-success text-background px-2 py-1 rounded">Present</span>`;
                                logsContainer.prepend(logEntry);
                            }
                        } 
                        // 2. The AI found a face, but they haven't blinked yet
                        else if (studentStatus.startsWith("Please Blink:")) {
                            let name = studentStatus.split(":")[1].trim();
                            blinkWarningText.innerText = `${name}, please blink to verify!`;
                            blinkWarning.classList.remove('hidden'); // Show the red warning overlay!
                        } 
                        // 3. The AI caught the blink, just waiting for eyes to open
                        else if (studentStatus.startsWith("Waiting:")) {
                            blinkWarningText.innerText = "Blink detected! Open eyes to finish...";
                            blinkWarning.classList.remove('hidden');
                        }
                    });
                } else {
                    // Hide warning if no faces are currently in frame
                    blinkWarning.classList.add('hidden');
                }
            })
            .catch(error => console.error('Error processing frame:', error));
            isFirstFrame = false;
        }
    </script>
</body>
</html>
